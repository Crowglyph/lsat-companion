<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1410" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Lex — LSAT Companion</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function safeReload() {
        var count = parseInt(sessionStorage.getItem('lex-reload') || '0', 10);
        if (count < 3) {
          sessionStorage.setItem('lex-reload', String(count + 1));
          setTimeout(function () { window.location.reload(); }, 500);
        }
      }
      window.addEventListener('error', function (e) {
        if (e.message && (
          e.message.includes('Failed to fetch dynamically imported module') ||
          e.message.includes('Loading chunk') ||
          e.message.includes('Importing a module script failed'))) {
          safeReload();
        }
      });
      window.addEventListener('unhandledrejection', function (e) {
        if (e.reason && e.reason.message && (
          e.reason.message.includes('Failed to fetch dynamically imported module') ||
          e.reason.message.includes('Importing a module script failed'))) {
          safeReload();
        }
      });
      window.addEventListener('load', function () { sessionStorage.removeItem('lex-reload'); });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
